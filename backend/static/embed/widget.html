<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Bot Widget — 吸血鬼 (vampire.kitahim.uk)</title>
<style>
  :root{
    --brand:#5b54e8; --brand-2:#7d78f0; --ink:#222033;
    --surface:rgba(255,255,255,.97); --dock:rgba(26,28,46,.58);
  }
  html, body { margin:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  #stage { position:absolute; inset:0; }
  #avatar-canvas { width:100%; height:100%; display:block; }
  #control-bar {
    position:absolute; left:8px; right:8px; bottom:10px;
    display:flex; flex-direction:column; gap:5px; padding:6px; border-radius:18px;
    background:var(--dock); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3);
    box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
    max-width:calc(100% - 16px);
  }
  .dock-row {
    display:flex; gap:5px; align-items:center; flex-wrap:wrap; justify-content:center;
  }
  #type-input {
    flex:1; min-width:0; appearance:none; border:none; outline:none;
    background:rgba(255,255,255,.92); color:var(--ink); border-radius:12px;
    height:36px; padding:0 12px; font:500 13.5px "Noto Sans TC", system-ui, sans-serif;
  }
  #type-input::placeholder { color:#888da0; }
  #type-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(91,84,232,.5); }
  .ctrl {
    appearance:none; border:none; cursor:pointer; color:#fff; background:rgba(255,255,255,.14);
    height:36px; min-width:36px; padding:0 9px; border-radius:12px; flex-shrink:0; white-space:nowrap;
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    font-size:13.5px; font-weight:600; line-height:1;
    transition:transform .12s, background .15s, filter .15s;
  }
  .ctrl:hover { background:rgba(255,255,255,.26); }
  .ctrl:active { transform:scale(.93); }
  .ctrl:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  .ctrl.primary { background:linear-gradient(135deg,var(--brand-2),var(--brand)); padding:0 13px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ctrl.primary:hover { filter:brightness(1.1); background:linear-gradient(135deg,var(--brand-2),var(--brand)); }
  .ctrl.listening { background:linear-gradient(135deg,#e74c3c,#c0392b)!important; animation:pulse 1.1s infinite; }
  .ctrl.llm-on { background:linear-gradient(135deg,#f2b34f,#e69426); }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.55);} 50%{ box-shadow:0 0 0 7px rgba(231,76,60,0);} }
  #bubble {
    /* Anchored above the control bar so it never blocks the avatar's face.
       Control bar is at bottom:10px with ~2 rows of 36px buttons + padding ≈ 100px.
       Place bubble at bottom: 110px so it sits cleanly above the bar. */
    position:absolute; right:14px; left:14px; bottom:110px; top:auto;
    background:var(--surface); color:var(--ink); border-radius:16px; padding:11px 14px;
    font-size:14px; line-height:1.55;
    box-shadow:0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(91,84,232,.1);
    opacity:0; transform:translateY(8px) scale(.98); transform-origin:bottom center;
    transition:opacity .22s, transform .22s; pointer-events:none;
    max-height:120px; overflow-y:auto;
  }
  #bubble::after { content:""; position:absolute; right:38px; top:-7px; width:14px; height:14px;
    background:var(--surface); transform:rotate(45deg); }
  #bubble.show { opacity:1; transform:none; }
  #suggestions {
    display:none;   /* hidden per user request 2026-06-12 */
    position:absolute; left:10px; right:10px; bottom:104px;
    flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:auto;
  }
  #suggestions .sg-label {
    width:100%; text-align:center; font-size:11px; font-weight:600; color:#fff; letter-spacing:.3px;
    text-shadow:0 1px 4px rgba(0,0,0,.55); margin-bottom:2px;
  }
  .sugg {
    appearance:none; cursor:pointer; white-space:nowrap;
    background:rgba(255,255,255,.92); color:var(--brand); border:1px solid rgba(91,84,232,.22);
    border-radius:999px; font-size:12px; font-weight:600; padding:6px 12px;
    box-shadow:0 3px 10px rgba(0,0,0,.16); transition:transform .12s, background .15s;
  }
  .sugg:hover { background:#fff; transform:translateY(-1px); }
  .sugg:active { transform:scale(.96); }
  .sugg:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  #direct-warn {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#f4f6f8; color:#556; font-size:15px; text-align:center; padding:24px;
  }
  #debug-hud {
    display:none;
    position:absolute; left:8px; top:8px; width:300px; height:160px;
    background:rgba(0,0,0,.78); color:#0f0; font:10.5px/1.35 ui-monospace,monospace;
    border-radius:6px; padding:6px 8px; overflow-y:auto; overflow-x:hidden;
    pointer-events:auto; cursor:grab;
    white-space:pre-wrap; word-break:break-all; z-index:99;
  }
  #debug-hud::-webkit-scrollbar { width:6px; }
  #debug-hud::-webkit-scrollbar-thumb { background:rgba(0,255,0,.4); border-radius:3px; }
  #debug-hud-head {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;
    padding-bottom:4px; border-bottom:1px solid rgba(0,255,0,.25);
    font-weight:bold; color:#ffeb3b; pointer-events:auto;
  }
  #debug-hud-toggle, #debug-hud-clear {
    background:rgba(255,255,255,.12); border:0; color:#fff; cursor:pointer;
    font-size:10px; padding:1px 6px; border-radius:3px; margin-left:4px;
  }
  #debug-hud-toggle:hover, #debug-hud-clear:hover { background:rgba(255,255,255,.25); }
  #debug-hud.collapsed { height:auto; min-height:22px; }
  #debug-hud.collapsed #debug-hud-body { display:none; }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble"></div>
    <canvas id="avatar-canvas"></canvas>
    <div id="suggestions"></div>
    <div id="control-bar">
      <div class="dock-row">
        <input id="type-input" type="text" maxlength="200" placeholder="打字問我也可以…" aria-label="輸入文字問題" />
        <button class="ctrl primary" id="btn-send" aria-label="送出文字問題" title="送出文字問題"><span aria-hidden="true">➤</span></button>
      </div>
      <div class="dock-row" role="toolbar" aria-label="虛擬人控制列">
        <button class="ctrl primary" id="btn-mic"   aria-label="開始語音對話" title="開始語音對話"><span aria-hidden="true">🎤</span> 說話</button>
        <button class="ctrl" id="btn-llm"   aria-label="設置 DeepSeek API Key 啟用 AI 大腦" aria-pressed="false" title="設置 DeepSeek API Key"><span aria-hidden="true">🧠</span></button>
        <button class="ctrl" id="btn-emote" aria-label="切換表情 (1-7/0 隨機)" aria-pressed="false" title="表情輪播 (1-7/0 隨機)"><span aria-hidden="true">😊</span></button>
        <button class="ctrl" id="btn-mute"  aria-label="靜音" aria-pressed="false" title="靜音 / 取消靜音"><span aria-hidden="true">🔊</span></button>
        <button class="ctrl" id="btn-voice" aria-label="切換語音" title="切換語音"><span aria-hidden="true">🗣️</span></button>
        <button class="ctrl" id="btn-speed" aria-label="調整語速" title="調整語速">1.0×</button>
        <button class="ctrl" id="btn-close" aria-label="收起助理" title="收起助理"><span aria-hidden="true">✕</span></button>
      </div>
    </div>
  </div>
  <div id="direct-warn">請透過 <code>embed.js</code> 載入此元件。</div>
  <div id="debug-hud">
    <div id="debug-hud-head">
      <span>🔧 debug</span>
      <span>
        <button id="debug-hud-clear" title="Clear logs">clear</button>
        <button id="debug-hud-toggle" title="Collapse/expand">−</button>
      </span>
    </div>
    <div id="debug-hud-body"></div>
  </div>
  <script>
    (function() {
      var body = null;
      function ensure() {
        if (!body) {
          body = document.getElementById('debug-hud-body');
          document.getElementById('debug-hud-clear').addEventListener('click', function(e) {
            e.stopPropagation(); body.textContent = '';
          });
          document.getElementById('debug-hud-toggle').addEventListener('click', function(e) {
            e.stopPropagation();
            var hud = document.getElementById('debug-hud');
            hud.classList.toggle('collapsed');
            this.textContent = hud.classList.contains('collapsed') ? '+' : '−';
          });
        }
        return body;
      }
      function fmt(args) {
        return Array.from(args).map(function(a) {
          if (a instanceof Error) return a.message;
          if (typeof a === 'object') { try { return JSON.stringify(a).slice(0, 300); } catch (e) { return String(a); } }
          return String(a);
        }).join(' ');
      }
      function push(prefix, args) {
        var b = ensure(); if (!b) return;
        var line = prefix + ' ' + fmt(args);
        b.textContent += line + '\n';
        var lines = b.textContent.split('\n');
        if (lines.length > 80) b.textContent = lines.slice(-80).join('\n');
        var hud = document.getElementById('debug-hud');
        hud.scrollTop = hud.scrollHeight;
      }
      var origLog = console.log, origWarn = console.warn, origErr = console.error;
      console.log   = function() { push('[log]',   arguments); origLog.apply(console, arguments); };
      console.warn  = function() { push('[warn]',  arguments); origWarn.apply(console, arguments); };
      console.error = function() { push('[ERR!]',  arguments); origErr.apply(console, arguments); };
    })();
  </script>

  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  <script src="knowledge.js"></script>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";
    const LLM_MODEL = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";
    let engine = null, loadingPromise = null;
    window.LLM = {
      supported: ('gpu' in navigator),
      state: 'idle',
      progress: 0,
      model: LLM_MODEL,
      async load(onProgress) {
        if (engine) return engine;
        if (loadingPromise) return loadingPromise;
        window.LLM.state = 'loading';
        loadingPromise = webllm.CreateMLCEngine(LLM_MODEL, {
          initProgressCallback: (p) => { window.LLM.progress = p.progress || 0; if (onProgress) onProgress(p); }
        }).then((e) => { engine = e; window.LLM.state = 'ready'; return e; })
          .catch((err) => { window.LLM.state = 'error'; window.LLM.error = String(err); throw err; });
        return loadingPromise;
      },
      async chat(messages) {
        if (!engine) return null;
        const r = await engine.chat.completions.create({ messages, temperature: 0.4, max_tokens: 220 });
        return r && r.choices && r.choices[0] && r.choices[0].message.content;
      }
    };
  </script>

  <script>
  const CFG = new URLSearchParams(location.search);
  const isLocal = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
  const DEFAULT_MODEL = isLocal
    ? '/static/live2d/vampire/' + encodeURIComponent('吸血鬼') + '.model3.json'
    : 'https://vampire.kitahim.uk/static/live2d/vampire/' + encodeURIComponent('吸血鬼') + '.model3.json';
  const MODEL_URL = CFG.get('model') || DEFAULT_MODEL;
  const TTS_ENDPOINT = CFG.get('api') || '/api/tts';
  let DEEPSEEK_KEY = localStorage.getItem('deepseek_key') || CFG.get('ds_key') || ''; // 透過 URL 參數或 localStorage 讀取 DeepSeek API Key
  const DEEPSEEK_API = CFG.get('ds_api') || 'https://api.deepseek.com/v1/chat/completions';

  console.log('[FRESH-BUILD] widget.html loaded at', new Date().toISOString(), 'with micro-movement v2');

  let model = null, app = null;
  let isSpeaking = false, mouthValue = 0, mouthTarget = 0.7;
  let ttsMuted = false, ttsRate = 1.0, ttVoice = null;
  let audioMouth = 0, useAudioMouth = false, audioCtx = null;
  let speakSeq = 0, currentSource = null, currentRaf = 0;
  let neuralDisabled = false;
  // Default voice: Cantonese female (per user explicit request 2026-06-11).
  // Overridable via embed.js data-voice attribute or ?voice=... URL param on embed.js.
  // Mutable so the voice-selector button can cycle through the /api/voices catalog.
  let NEURAL_VOICE = CFG.get('voice') || 'cantonese-female';
  let recognition = null, listening = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  const isEmbedded = window.self !== window.top;
  const devBypass  = new URLSearchParams(location.search).has('dev');
  if (!isEmbedded && !devBypass) {
    document.getElementById('stage').style.display = 'none';
    document.getElementById('direct-warn').style.display = 'flex';
  } else {
    bootAvatar();
  }

  function postToParent(type, payload) {
    try { window.parent.postMessage(Object.assign({ ns: 'avatar-widget', type }, payload || {}), '*'); } catch (e) {}
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.ns !== 'avatar-widget-host') return;
    if (d.type === 'say') speak(String(d.text || '').slice(0, 600));
  });

  function showBubble(text) {
    const b = document.getElementById('bubble');
    b.textContent = text; b.classList.add('show');
    clearTimeout(showBubble._t);
    showBubble._t = setTimeout(() => b.classList.remove('show'), 6000);
  }

  function loadVoice() {
    const vs = speechSynthesis.getVoices();
    const pick = (re) => vs.find(v => re.test(v.name + ' ' + v.lang) && !/Google/i.test(v.name));
    ttVoice =
         pick(/(HsiaoChen|HsiaoYu|曉臻|曉雨).*zh/i)
      || pick(/(Yating|Zhiwei).*zh[-_]TW/i)
      || pick(/Microsoft.*zh[-_]TW/i)
      || pick(/zh[-_]TW/i)
      || pick(/^zh/i)
      || vs.find(v => /zh/i.test(v.lang))
      || null;
  }
  if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }

  function stopSpeaking() {
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { clearInterval(speakBrowser._poll); } catch (e) {}
    if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    isSpeaking = false; useAudioMouth = false; audioMouth = 0;
  }

  // Smart truncation: if text is over the soft cap, cut at the last sentence
  // boundary so TTS never gets a mid-sentence garbled cut. Bubble keeps the full text.
  function _ttsTruncate(text, softCap) {
    softCap = softCap || 120;
    if (text.length <= softCap) return text;
    // Look for the last sentence-ending punctuation within the soft cap
    var lastEnd = -1;
    for (var i = 0; i < softCap; i++) {
      var c = text.charAt(i);
      if (c === '。' || c === '！' || c === '?' || c === '?' || c === '!' || c === ';') {
        lastEnd = i;
      }
    }
    if (lastEnd > 20) return text.slice(0, lastEnd + 1);
    // No sentence boundary found: hard-cut at softCap, drop the trailing partial char
    return text.slice(0, softCap);
  }

  function speak(text) {
    // Defense in depth: strip any leftover emotion tags from the TTS-bound text.
    // The streaming engine already strips them, but hard-coded callers and any
    // post-streaming retry paths should never leak tags like <neutral> to TTS.
    var stripped = String(text || '').replace(/<\s*(?:neutral|happy|sad|angry|surprised|shy|thinking)\s*>/gi, '').trim();
    if (!stripped) return;
    // TTS-bound copy is smart-truncated; bubble can show the full stripped text.
    var ttsText = _ttsTruncate(stripped, 120);
    const myseq = ++speakSeq;
    showBubble(stripped);
    postToParent('speaking', { text: stripped });
    if (ttsMuted) return;
    stopSpeaking();
    if (neuralDisabled) { speakBrowser(ttsText); return; }
    speakNeural(ttsText, myseq).catch((e) => {
      if (myseq !== speakSeq) return;
      const msg = (e && e.message) || '';
      if (/http 4\d\d|Failed to fetch|NetworkError|Load failed/i.test(msg)) neuralDisabled = true;
      console.warn('神經語音失敗，退回瀏覽器語音：', msg);
      useAudioMouth = false;
      speakBrowser(ttsText);
    });
  }

  async function speakNeural(text, seq) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch (e) {} }
    const sep = TTS_ENDPOINT.indexOf('?') < 0 ? '?' : '&';
    const resp = await fetch(TTS_ENDPOINT + sep + 'voice=' + encodeURIComponent(NEURAL_VOICE) + '&text=' + encodeURIComponent(text));
    if (seq !== speakSeq) return;
    if (!resp.ok) throw new Error('http ' + resp.status);
    const arr = await resp.arrayBuffer();
    if (seq !== speakSeq) return;
    if (arr.byteLength < 800) throw new Error('audio too small');
    const audioBuf = await audioCtx.decodeAudioData(arr);
    if (seq !== speakSeq) return;
    const src = audioCtx.createBufferSource(); src.buffer = audioBuf;
    const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
    src.connect(analyser); analyser.connect(audioCtx.destination);
    const data = new Uint8Array(analyser.fftSize);
    currentSource = src;
    useAudioMouth = true; isSpeaking = true;
    if (model) try { model.motion('Tap'); } catch (e) {}
    const loop = () => {
      if (currentSource !== src) return;
      analyser.getByteTimeDomainData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
      audioMouth = Math.min(1, Math.sqrt(sum / data.length) * 3.4);
      currentRaf = requestAnimationFrame(loop);
    };
    currentRaf = requestAnimationFrame(loop);
    src.onended = () => {
      if (currentSource !== src) return;
      if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
      isSpeaking = false; useAudioMouth = false; audioMouth = 0;
      currentSource = null;
    };
    src.start(0);
  }

  function speakBrowser(text) {
    if (ttsMuted || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    if (!ttVoice) loadVoice();
    if (ttVoice) u.voice = ttVoice;
    u.lang = (ttVoice && ttVoice.lang) || 'zh-TW';
    u.rate = ttsRate; u.pitch = 1.0;
    u.onboundary = () => { mouthTarget = 0.5 + Math.random() * 0.5; };
    u.onend = () => { isSpeaking = false; clearInterval(speakBrowser._poll); };
    const fire = () => {
      speechSynthesis.speak(u);
      isSpeaking = true; mouthTarget = 0.7; if (model) try { model.motion('Tap'); } catch (e) {}
      const t0 = performance.now();
      clearInterval(speakBrowser._poll);
      speakBrowser._poll = setInterval(() => {
        const elapsed = performance.now() - t0;
        const active = speechSynthesis.speaking || speechSynthesis.pending;
        if ((elapsed > 1000 && !active) || elapsed > 16000) { isSpeaking = false; clearInterval(speakBrowser._poll); }
      }, 150);
    };
    if (speechSynthesis.speaking || speechSynthesis.pending) { speechSynthesis.cancel(); setTimeout(fire, 130); }
    else fire();
  }

  function bigrams(s) {
    s = (s || '').toLowerCase().replace(/[\s，。、？！,.?!~～]/g, '');
    const g = [];
    for (let i = 0; i < s.length - 1; i++) g.push(s.slice(i, i + 2));
    if (s.length === 1) g.push(s);
    return g;
  }
  function similarity(query, text) {
    const A = bigrams(query), B = new Set(bigrams(text));
    if (!A.length || !B.size) return 0;
    let hit = 0; for (const x of A) if (B.has(x)) hit++;
    return hit / Math.sqrt(A.length * B.size);
  }
  function scoreEntry(q, e) {
    let score = Math.max(similarity(q, e.q), similarity(q, e.kw || ''));
    const terms = (e.kw || '').split(/\s+/).filter(Boolean);
    for (const t of terms) { if (t.length >= 2 && q.includes(t)) score = Math.max(score, 0.5 + t.length * 0.04); }
    return score;
  }
  function topK(q, k) {
    return (window.KB || []).map(e => ({ e, s: scoreEntry(q, e) }))
      .sort((a, b) => b.s - a.s).slice(0, k).filter(x => x.s > 0.05).map(x => x.e);
  }
  function brain(qRaw) {
    const q = (qRaw || '').trim();
    if (!q) return '我好像沒聽清楚，可以再說一次嗎？';
    let best = null, bestScore = 0;
    for (const e of (window.KB || [])) { const s = scoreEntry(q, e); if (s > bestScore) { bestScore = s; best = e; } }
    if (best && bestScore >= 0.16) return best.a;
    return '你問的是「' + q + '」對吧？這題我的知識庫還沒收錄～你可以問我「怎麼安裝」「怎麼換成你的角色」「要不要錢」「麥克風怎麼用」這些喔。';
  }
  async function answer(q) {
    q = (q || '').trim();
    if (!q) return '我好像沒聽清楚，可以再說一次嗎？';
    if (window.LLM && window.LLM.state === 'ready') {
      const ctx = topK(q, 3).map(e => 'Q：' + e.q + '\nA：' + e.a).join('\n---\n');
      const messages = [
        { role: 'system', content: '你是「吸血鬼」虛擬人助手。請用繁體中文、口語、最多兩三句話簡短回答。優先依據【參考資料】回答；資料沒有的就用常識簡短回應，不確定就老實說不知道。\n\n【參考資料】\n' + (ctx || '（無）') },
        { role: 'user', content: q }
      ];
      try {
        showBubble('讓我想想…');
        const out = await window.LLM.chat(messages);
        if (out && out.trim()) return out.trim();
      } catch (e) { console.warn('LLM error', e); }
    }
    return brain(q);
  }

  // =====================================================================
  // 核心增強：DeepSeek 多模態實時流式解析狀態機
  // =====================================================================
  const DEEPSEEK_STREAM_ENGINE = (function() {
    // Streaming parser for DeepSeek chat completions. The model emits inline emotion
    // tags like `<happy>` interleaved with the narrative text, sometimes split across
    // multiple tokens. We need to:
    //   1) Fire `trigger(emo)` once per COMPLETE tag
    //   2) Strip all tags (complete + partial) from the text the user sees/hears
    //   3) Return only the NEW clean text delta each call
    //
    // Implementation note (2026-06-12 fix):
    //   The previous design trimmed the buffer to the trailing partial tag, which
    //   caused clean text to shrink across calls (clean was computed from the
    //   trimmed buffer, losing prefix characters that hadn't been "emitted" yet).
    //   Now we keep the FULL clean text and just remember what we've emitted.
    var _clean = '';          // cumulative clean text (post-tag-strip)
    var _emitted = '';        // suffix of _clean that has already been returned
    var _pendingTail = '';    // unclosed tag-like prefix held across calls
    var _watchdog = null;

    function clearEmotionMatrix() {
      if (!window.KNOWLEDGE) return;
      var pins = [
        'PARAM_MOUTH_FORM', 'PARAM_EYE_L_OPEN', 'PARAM_EYE_R_OPEN',
        'PARAM_ANGLE_X', 'PARAM_ANGLE_Y', 'PARAM_BROW_L_Y', 'PARAM_BROW_R_Y',
        'PARAM_BROW_L_FORM', 'PARAM_BROW_R_FORM', 'PARAMTEARS', 'PARAMANGRY', 'PARAMSHY'
      ];
      var resetMap = {};
      pins.forEach(function(p) { resetMap[p] = 0.0; });
      window.KNOWLEDGE.bulkSet(resetMap);
    }

    function trigger(emo) {
      if (_watchdog) clearTimeout(_watchdog);
      clearEmotionMatrix();
      if (typeof applyEmotion === 'function') {
        applyEmotion(emo);
      }
      // 生理超時自銷毀安全鎖：8 秒後自動淡出，防範 AI 網路斷線定格崩潰
      _watchdog = setTimeout(function() {
        clearEmotionMatrix();
      }, 8000);
    }

    // Strip complete + partial emotion tags from raw input.
    //   - `<happy>`     → '' (complete)
    //   - `<neu`        → '' (partial, awaiting 'tral>')
    //   - `5 < 3`       → `5 < 3` (NOT a tag; we don't touch it)
    //   - bare `<`      → `<` (NOT a tag until we see letters)
    // Use a function-based check so bare '<' or '< 3' is never stripped.
    var VALID = ['neutral', 'happy', 'sad', 'angry', 'surprised', 'shy', 'thinking'];
    var COMPLETE_TAG_RE = new RegExp('<(' + VALID.join('|') + ')>', 'g');
    function isPartialTagBody(body) {
      // body: the text AFTER '<'. Returns true if body is all-lowercase letters
      // AND is a prefix of one of the valid emotion names.
      return /^[a-z]+$/.test(body) && VALID.some(function(v) { return v.indexOf(body) === 0; });
    }
    function stripTags(raw) {
      // Replace `<name>` (complete) and `<name...` (partial, no '>') with ''.
      // We do this with a manual scan to avoid the regex over-matching bare '<'.
      var out = '';
      var i = 0;
      while (i < raw.length) {
        if (raw.charAt(i) === '<' && i + 1 < raw.length) {
          // Try to read the tag body
          var j = i + 1;
          while (j < raw.length && /[a-z]/.test(raw.charAt(j))) j++;
          var body = raw.slice(i + 1, j);
          // Check if it's a complete or partial emotion tag
          if (j < raw.length && raw.charAt(j) === '>') {
            // Complete tag candidate
            if (VALID.indexOf(body) >= 0) { i = j + 1; continue; }
            // Not a known tag — keep the '<' as-is, advance by 1
            out += raw.charAt(i); i++;
          } else if (isPartialTagBody(body)) {
            // Partial tag (e.g. '<neu' where body is prefix of 'neutral')
            // Skip the entire partial
            i = j;
            continue;
          } else {
            // Looks like a stray '<' (e.g. '5 < 3') — keep as-is
            out += raw.charAt(i); i++;
          }
        } else {
          out += raw.charAt(i); i++;
        }
      }
      return out;
    }
    function fireCompleteTags(raw) {
      var re = new RegExp('<(' + VALID.join('|') + ')>', 'g');
      var m;
      while ((m = re.exec(raw)) !== null) trigger(m[1]);
    }

    return {
      reset: function() {
        _clean = ''; _emitted = ''; _pendingTail = '';
        if (_watchdog) clearTimeout(_watchdog);
        clearEmotionMatrix();
      },
      parseToken: function(token) {
        if (!token) return '';
        // Combine pending tail (unclosed tag from prior call) with new token
        var combined = _pendingTail + token;
        _pendingTail = '';

        // Detect an unclosed partial tag at the end. Scan forward from the
        // last '<' to find where the tag body ends (next non-letter or EOL).
        // If it looks like a partial emotion tag, hold it.
        var lastLt = combined.lastIndexOf('<');
        if (lastLt >= 0) {
          var lastGt = combined.lastIndexOf('>');
          if (lastGt < lastLt) {
            // There's a '<' with no '>' after it. Determine tag body length.
            var end = lastLt + 1;
            while (end < combined.length && /[a-z]/.test(combined.charAt(end))) end++;
            var body = combined.slice(lastLt + 1, end);
            // If body is a prefix of any valid emotion name, hold the tail.
            if (isPartialTagBody(body) && body.length > 0) {
              _pendingTail = combined.slice(lastLt);
              combined = combined.slice(0, lastLt);
            }
            // Else: not a tag, fall through and process normally.
          }
        }

        // Fire complete emotion tags in the processed text
        fireCompleteTags(combined);
        // Strip all tags (complete ones + stray partials that snuck through)
        var stripped = stripTags(combined);
        // Append to cumulative clean text
        _clean += stripped;
        // Safety: if _emitted isn't a prefix of _clean, just emit everything.
        if (_emitted && _clean.indexOf(_emitted) !== 0) _emitted = '';
        var delta = _clean.slice(_emitted.length);
        _emitted = _clean;
        return delta;
      }
    };
  })();

  async function handleDeepSeekStream(text) {
    DEEPSEEK_STREAM_ENGINE.reset();
    showBubble('🧛 思考中…');

    // Hard cap on streamed output so we never accumulate more than what TTS can speak.
    // TTS endpoint caps at 150 chars; bubble can show a bit more for legibility, but
    // anything past this is dropped from the stream to prevent mid-sentence audio cuts.
    const STREAM_TEXT_CAP = 200;   // streaming buffer cap (post-strip)
    const STREAM_END_MARKERS = ['。', '！', '？', '?', '!', '!', '~'];  // stop at first sentence boundary (fullwidth + halfwidth)
    let streamEnded = false;

    try {
      const response = await fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DEEPSEEK_KEY
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          // Hard cap on output tokens (~150 Chinese chars). DeepSeek default is 8192.
          max_tokens: 200,
          // Lower temperature for more deterministic, less garbled output.
          temperature: 0.7,
          messages: [
            { role: 'system', content: '你是網頁右下角的吸血鬼少女助手。你傲嬌、毒舌但內心體貼。\n回應規則（請嚴格遵守）：\n1. 繁體中文，台灣用語。\n2. 字數 80–120 個字以內，最多三句。\n3. 句首內聯情感標籤，每段回應最少 1 個：<happy> <sad> <angry> <surprised> <shy> <thinking> <neutral>。\n4. 只用一個標籤在開頭。不要在句子中間切換情緒。\n5. 不要用英文、不要用簡體字、不要使用 Markdown、表情符號或代碼區塊。\n範例：<angry>哈？這種簡單的事情你竟然都不懂！<shy>真拿你沒辦法...' },
            { role: 'user', content: text }
          ],
          stream: true
        })
      });

      if (!response.ok) throw new Error('API 返回 HTTP ' + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let accumulatedCleanText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          var cleanLine = line.trim();
          if (!cleanLine || !cleanLine.startsWith('data: ')) continue;
          if (cleanLine.includes('[DONE]')) break;

          try {
            var rawJson = cleanLine.slice(6);
            var parsed = JSON.parse(rawJson);
            var token = parsed.choices[0].delta.content || '';
            if (token && !streamEnded) {
              var safeToken = DEEPSEEK_STREAM_ENGINE.parseToken(token);
              if (safeToken) {
                accumulatedCleanText += safeToken;
                document.getElementById('bubble').textContent = accumulatedCleanText;
                document.getElementById('bubble').classList.add('show');
                // Stop accumulating once we hit a sentence-ending punctuation past 30 chars.
                // Prevents runaway streams and ensures TTS gets a complete sentence.
                if (accumulatedCleanText.length > 50) {
                  var lastChar = accumulatedCleanText.slice(-1);
                  if (STREAM_END_MARKERS.indexOf(lastChar) >= 0) {
                    streamEnded = true;
                    try { reader.cancel(); } catch (e) {}
                    break;
                  }
                }
                if (accumulatedCleanText.length >= STREAM_TEXT_CAP) {
                  streamEnded = true;
                  try { reader.cancel(); } catch (e) {}
                  break;
                }
              }
            }
          } catch (e) {}
        }
        if (streamEnded) break;
      }

      if (accumulatedCleanText.trim()) {
        speak(accumulatedCleanText.trim());
      }
    } catch (err) {
      console.error('[DeepSeek API 錯誤]', err);
      speak('連接核心網路失敗：' + err.message);
    }
  }

    if (listening && recognition) { recognition.stop(); return; }
    try { recognition = new SR(); } catch (e) { speak('語音辨識啟動失敗：' + e.message); return; }
    recognition.lang = 'zh-TW'; recognition.interimResults = true;
    recognition.continuous = false; recognition.maxAlternatives = 1;
    recognition.onstart  = () => { listening = true; setMic(true); showBubble('聆聽中…請說話 🎙️'); };
    recognition.onresult = (e) => {
      let txt = ''; for (const r of e.results) txt += r[0].transcript;
      const last = e.results[e.results.length - 1];
      if (last.isFinal) handleUser(txt.trim());
      else showBubble('「' + txt + '」…');
    };
    recognition.onerror = (e) => { listening = false; setMic(false);
      showBubble(e.error === 'not-allowed' ? '我需要麥克風權限才能聽你說話喔。' : '沒聽清楚（' + e.error + '），再試一次。'); };
    recognition.onend   = () => { listening = false; setMic(false); };
    try { recognition.start(); } catch (e) {}
  }

          'PARAM_ANGLE_X': -3, 'PARAM_ANGLE_Y': -5,
          'PARAM_BROW_L_Y': -0.6, 'PARAM_BROW_R_Y': -0.6,
          'PARAM_BROW_L_FORM': -0.4, 'PARAM_BROW_R_FORM': -0.4,
          'PARAMTEARS': 1,
        },
        angry:     {
          'PARAM_MOUTH_FORM': -0.6,
          'PARAM_ANGLE_X': 2, 'PARAM_ANGLE_Y': 2,
          'PARAM_BROW_L_Y': 0.4, 'PARAM_BROW_R_Y': 0.4,
          'PARAM_BROW_L_FORM': -0.7, 'PARAM_BROW_R_FORM': -0.7,
          'PARAM_EYE_L_OPEN': 0.95, 'PARAM_EYE_R_OPEN': 0.95,
          'PARAMANGRY': 1,
        },
        surprised: {
          'PARAM_EYE_L_OPEN': 1.2, 'PARAM_EYE_R_OPEN': 1.2,
          'PARAM_ANGLE_X': 0, 'PARAM_ANGLE_Y': 5,
          'PARAM_MOUTH_OPEN_Y': 0.7,
          'PARAM_BROW_L_Y': 0.7, 'PARAM_BROW_R_Y': 0.7,
        },
        shy:       {
          'PARAM_ANGLE_X': -5, 'PARAM_ANGLE_Y': -3,
          'PARAM_EYE_L_OPEN': 0.6, 'PARAM_EYE_R_OPEN': 0.6,
          'PARAM_MOUTH_FORM': 0.3,
          'PARAMSHY': 1,
        },
        thinking:  {
          'PARAM_ANGLE_X': -7, 'PARAM_ANGLE_Y': 5,
          'PARAM_EYE_L_OPEN': 0.85, 'PARAM_EYE_R_OPEN': 0.85,
          'PARAM_EYE_BALL_X': -0.6, 'PARAM_EYE_BALL_Y': 0.4,
          'PARAM_BROW_L_FORM': 0.5, 'PARAM_BROW_R_FORM': 0.5,
        },
      };
      const EMOTION_KEYS = ['neutral', 'happy', 'sad', 'angry', 'surprised', 'shy', 'thinking'];
      const EMOTION_LABELS = { neutral:'😶 待機', happy:'😊 開心', sad:'😢 傷心', angry:'😠 生氣', surprised:'😲 驚訝', shy:'😳 害羞', thinking:'🤔 思考' };
      let currentEmotion = 'neutral';

      window.applyEmotion = function(name) { // 提至全域供狀態機外部鏈路調用
        if (!window.KNOWLEDGE) { console.warn('[emotion] no KNOWLEDGE'); return; }
        const preset = EMOTION_PRESETS[name];
        if (!preset) { console.warn('[emotion] unknown:', name); return; }
        const r = window.KNOWLEDGE.bulkSet(preset);
        currentEmotion = name;
        console.log('[emotion] ' + name + ' => ok=' + r.ok + ' failed=' + r.failed);
        showBubble('表情：' + (EMOTION_LABELS[name] || name));
      }

      const btnEmote = document.getElementById('btn-emote');
      if (btnEmote) {
        let emoIdx = 0;
        btnEmote.addEventListener('click', () => {
          emoIdx = (emoIdx + 1) % EMOTION_KEYS.length;
          applyEmotion(EMOTION_KEYS[emoIdx]);
        });
      }
      document.addEventListener('keydown', (e) => {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
        const k = e.key;
        if (k >= '0' && k <= '7') {
          if (k === '0') {
            const pick = EMOTION_KEYS[Math.floor(Math.random() * EMOTION_KEYS.length)];
            applyEmotion(pick);
          } else {
            const idx = parseInt(k, 10) - 1;
            if (idx >= 0 && idx < EMOTION_KEYS.length) applyEmotion(EMOTION_KEYS[idx]);
          }
        }
      });

      setTimeout(() => {
        if (window.KNOWLEDGE) applyEmotion('happy');
        let cycleIdx = 0;
        // 註冊至全域命名空間，便於 handleUser 在互動開始時將其精確銷毀
        window.__demoCarouselInterval = setInterval(() => {
          if (!window.KNOWLEDGE) return;
          cycleIdx = (cycleIdx + 1) % EMOTION_KEYS.length;
          applyEmotion(EMOTION_KEYS[cycleIdx]);
        }, 8000);
      }, 1500);

      // Bug 1 修正：將本地尋址代理與安全防禦命名空間 KNOWLEDGE 強制綁定，並全面換用全大寫底線引腳
      function safeSetParam(name, value) {
        if (window.KNOWLEDGE && typeof window.KNOWLEDGE.setParam === 'function') {
          window.KNOWLEDGE.setParam(name, value);
          return;
        }
        try {
          const cm = model && model.internalModel && model.internalModel.coreModel;
          if (!cm) return;
          cm.setParameterValueById(name, Number(value));
        } catch (e) {}
      }

      function probeParamIndices() {
        const im = model && model.internalModel;
        if (!im) return;
        const params = im.parameters;
        if (!params) return;
        const count = (typeof params.getCount === 'function') ? params.getCount() : 194;
        let allIds = [];
        if (typeof params.getId === 'function') {
          for (let i = 0; i < count; i++) {
            try { allIds.push(params.getId(i) || '<null>'); } catch (e) {}
          }
        }
        console.log('[Live2D] internalModel.parameters IDs:', JSON.stringify(allIds.slice(0, 30)));
      }
      probeParamIndices();

      // 互動式滑鼠與自然擺動融合模組
      let mouseX = 0, mouseY = 0;
      let hasMouseInput = false;

      const canvasEl = document.getElementById('avatar-canvas');
      if (canvasEl) {
        canvasEl.addEventListener('pointermove', (e) => {
          const rect = canvasEl.getBoundingClientRect();
          mouseX = e.clientX - rect.left;
          mouseY = e.clientY - rect.top;
          hasMouseInput = true;
        });
        canvasEl.addEventListener('pointerleave', () => {
          hasMouseInput = false;
        });
      }

      let lastBlinkT = 0, nextBlinkIn = 2.0;
      app.ticker.add(() => {
        const t = performance.now() / 1000;
        const w = app.renderer.width, h = app.renderer.height;

        // 計算滑鼠/自然隨機晃動的目標座標
        let targetX = w / 2;
        let targetY = h / 2;

        if (hasMouseInput) {
          targetX = mouseX;
          targetY = mouseY;
        } else {
          // 沒有滑鼠輸入時，使用 Sine/Cos 產生微小自然晃動（幅度要足夠，約寬度 12%、高度 8% 的偏移）
          targetX = w / 2 + Math.sin(t * 0.5) * (w * 0.12);
          targetY = h / 2 + Math.cos(t * 0.4) * (h * 0.08);
        }

        // 使用 model.track 追蹤目標（會寫入 PARAM_ANGLE_X/Y 及 PARAM_EYE_BALL_X/Y）
        if (model && typeof model.track === 'function') {
          model.track(targetX, targetY);
        }

        // 呼吸 (PARAM_BREATH) 振幅為 0 到 1 之間
        const breath = (Math.sin(t * 1.5) + 1.0) / 2.0;
        safeSetParam('PARAM_BREATH', breath);

        // 身體晃動 (PARAM_BODY_ANGLE_X/Y)
        const bodySwayX = Math.sin(t * 0.4) * 2.5; // -2.5 到 2.5 度的擺動
        const bodySwayY = Math.cos(t * 0.3) * 1.5;
        safeSetParam('PARAM_BODY_ANGLE_X', bodySwayX);
        safeSetParam('PARAM_BODY_ANGLE_Y', bodySwayY);

        // 眨眼邏輯
        if (t - lastBlinkT > nextBlinkIn) {
          lastBlinkT = t;
          nextBlinkIn = 2.0 + Math.random() * 3.0;
        }
        const sinceBlink = t - lastBlinkT;
        let blinkVal = 1.0;
        if (sinceBlink < 0.15) {
          blinkVal = 0.0;
        } else if (sinceBlink < 0.25) {
          blinkVal = (sinceBlink - 0.15) / 0.10;
        }
        safeSetParam('PARAM_EYE_L_OPEN', blinkVal);
        safeSetParam('PARAM_EYE_R_OPEN', blinkVal);

        // 嘴巴張合邏輯：說話時隨機嘴型，沒說話時閉合
        const mouthTarget = useAudioMouth ? audioMouth : (isSpeaking ? (0.3 + Math.random() * 0.55) : 0);
        mouthValue += (mouthTarget - mouthValue) * 0.35;
        safeSetParam('PARAM_MOUTH_OPEN_Y', mouthValue);
      });

      const sg = [
        { q: '打招呼', t: '你好' },
        { q: '自我介紹', t: '這是什麼' },
        { q: '安裝', t: '怎麼安裝' },
        { q: '換皮', t: '怎麼換成你的角色' }
      ];
      const sgel = document.getElementById('suggestions');
      const lbl = document.createElement('div');
      lbl.className = 'sg-label'; lbl.textContent = '問我：';
      sgel.appendChild(lbl);
      sg.forEach(s => {
        const b = document.createElement('button');
        b.className = 'sugg'; b.textContent = s.t;
        b.addEventListener('click', () => handleUser(s.t));
        sgel.appendChild(b);
      });

      setTimeout(() => speak('哈囉，我是吸血鬼，可以問我任何問題。'), 500);
    } catch (e) {
      console.error('Live2D load failed:', e);
    }
  }

  document.getElementById('btn-send').addEventListener('click', () => {
    const inp = document.getElementById('type-input');
    const t = inp.value.trim(); if (t) { handleUser(t); inp.value = ''; }
  });
  document.getElementById('type-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-send').click(); }
  });
  document.getElementById('btn-mic').addEventListener('click', startListening);
  document.getElementById('btn-mute').addEventListener('click', (e) => {
    ttsMuted = !ttsMuted;
    e.currentTarget.classList.toggle('ctrl', !ttsMuted);
    if (ttsMuted) stopSpeaking();
    e.currentTarget.textContent = ttsMuted ? '🔇' : '🔊';
  });
  document.getElementById('btn-speed').addEventListener('click', (e) => {
    const rates = [0.8, 1.0, 1.2, 1.5, 2.0];
    const idx = rates.indexOf(ttsRate);
    ttsRate = rates[(idx + 1) % rates.length];
    e.currentTarget.textContent = ttsRate.toFixed(1) + '×';
  });
  // Voice selector — fetch /api/voices and cycle through, with localStorage persistence
  (function() {
    const btn = document.getElementById('btn-voice');
    const KEY = 'xiaob_voice_id';
    let voices = [];
    const saved = (function() { try { return localStorage.getItem(KEY); } catch (e) { return null; } })();
    if (saved) NEURAL_VOICE = saved;
    function shortLabel(id) {
      if (!id) return '粵女';
      if (id.startsWith('cantonese-female')) return '粵女';
      if (id.startsWith('cantonese-male'))   return '粵男';
      if (id.startsWith('cantonese-gentle')) return '粵柔';
      if (id.startsWith('cantonese-cute'))   return '粵萌';
      if (id.startsWith('cantonese-playful'))return '粵活';
      if (id.startsWith('cantonese-kind'))   return '粵善';
      if (id.startsWith('mandarin-female'))  return '普女';
      if (id.startsWith('mandarin-male'))    return '普男';
      if (id.startsWith('mandarin-shaonv'))  return '普少';
      if (id.startsWith('mandarin-yujie'))   return '普御';
      if (id.startsWith('mandarin-chengshu'))return '普熟';
      return id.split('-').pop().slice(0, 4);
    }
    function updateLabel() { if (btn) btn.firstElementChild.nextSibling.textContent = ' ' + shortLabel(NEURAL_VOICE); }
    if (btn) {
      btn.innerHTML = '<span aria-hidden="true">🗣️</span> ' + shortLabel(NEURAL_VOICE);
      btn.addEventListener('click', async (e) => {
        if (!voices.length) {
          try {
            const base = TTS_ENDPOINT.replace(/\/api\/tts.*$/, '');
            const r = await fetch(base + '/api/voices');
            const j = await r.json();
            voices = j.voices || [];
          } catch (err) { console.warn('voice list fetch failed', err); }
        }
        if (!voices.length) { speak('語音目錄未就緒，請稍後重試。'); return; }
        const curIdx = voices.findIndex(v => v.id === NEURAL_VOICE);
        const next = voices[(curIdx + 1 + voices.length) % voices.length];
        NEURAL_VOICE = next.id;
        try { localStorage.setItem(KEY, NEURAL_VOICE); } catch (err) {}
        updateLabel();
        // Speak a sample so the user can hear the new voice
        speak(next.name);
      });
    }
  })();
  document.getElementById('btn-close').addEventListener('click', () => {
    try { window.parent.postMessage({ ns: 'avatar-widget', type: 'close' }, '*'); } catch (e) {}
  });
  // 初始化時檢查是否有金鑰，有的話高亮大腦按鈕
  const btnLlm = document.getElementById('btn-llm');
  if (DEEPSEEK_KEY) {
    btnLlm.classList.add('llm-on');
    btnLlm.title = '已啟用 DeepSeek 大腦';
  }

  btnLlm.addEventListener('click', () => {
    const key = prompt("請輸入您的 DeepSeek API Key (留下空白並送出可清除金鑰)：", DEEPSEEK_KEY);
    if (key !== null) {
      const cleanKey = key.trim();
      if (cleanKey) {
        DEEPSEEK_KEY = cleanKey;
        localStorage.setItem('deepseek_key', DEEPSEEK_KEY);
        btnLlm.classList.add('llm-on');
        btnLlm.title = '已啟用 DeepSeek 大腦';
        speak("DeepSeek 大腦已成功啟用！");
      } else {
        DEEPSEEK_KEY = '';
        localStorage.removeItem('deepseek_key');
        btnLlm.classList.remove('llm-on');
        btnLlm.title = '大腦未啟用';
        speak("已清除 DeepSeek 金鑰。");
      }
    }
  });
  </script>
</body>

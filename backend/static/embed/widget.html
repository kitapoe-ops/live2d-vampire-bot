<style>
  :root{
    --brand:#5b54e8; --brand-2:#7d78f0; --ink:#222033;
    --surface:rgba(255,255,255,.97); --dock:rgba(26,28,46,.58);
  }
  html, body { margin:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  #stage { position:absolute; inset:0; }
  #avatar-canvas { width:100%; height:100%; display:block; }
  #control-bar {
    position:absolute; left:8px; right:8px; bottom:10px;
    display:flex; flex-direction:column; gap:5px; padding:6px; border-radius:18px;
    background:var(--dock); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3);
    box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
    max-width:calc(100% - 16px);
  }
  .dock-row {
    display:flex; gap:5px; align-items:center; flex-wrap:wrap; justify-content:center;
  }
  #type-input {
    flex:1; min-width:0; appearance:none; border:none; outline:none;
    background:rgba(255,255,255,.92); color:var(--ink); border-radius:12px;
    height:36px; padding:0 12px; font:500 13.5px "Noto Sans TC", system-ui, sans-serif;
  }
  #type-input::placeholder { color:#888da0; }
  #type-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(91,84,232,.5); }
  .ctrl {
    appearance:none; border:none; cursor:pointer; color:#fff; background:rgba(255,255,255,.14);
    height:36px; min-width:36px; padding:0 9px; border-radius:12px; flex-shrink:0; white-space:nowrap;
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    font-size:13.5px; font-weight:600; line-height:1;
    transition:transform .12s, background .15s, filter .15s;
  }
  .ctrl:hover { background:rgba(255,255,255,.26); }
  .ctrl:active { transform:scale(.93); }
  .ctrl:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  .ctrl.primary { background:linear-gradient(135deg,var(--brand-2),var(--brand)); padding:0 13px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ctrl.primary:hover { filter:brightness(1.1); background:linear-gradient(135deg,var(--brand-2),var(--brand)); }
  .ctrl.listening { background:linear-gradient(135deg,#e74c3c,#c0392b)!important; animation:pulse 1.1s infinite; }
  .ctrl.llm-on { background:linear-gradient(135deg,#f2b34f,#e69426); }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.55);} 50%{ box-shadow:0 0 0 7px rgba(231,76,60,0);} }
  #bubble {
    /* Anchored directly above the control bar via dynamic JS (see positionBubble()).
       CSS fallback bottom value handles initial render before JS runs. */
    position:absolute; left:14px; right:14px; bottom:120px; top:auto;
    background:var(--surface); color:var(--ink); border-radius:16px; padding:11px 14px;
    font-size:14px; line-height:1.55;
    box-shadow:0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(91,84,232,.1);
    opacity:0; transform:translateY(8px) scale(.98); transform-origin:bottom center;
    transition:opacity .22s, transform .22s; pointer-events:none;
    max-height:40vh; overflow-y:auto;
  }
  #bubble::after { content:""; position:absolute; right:38px; top:-7px; width:14px; height:14px;
    background:var(--surface); transform:rotate(45deg); }
  #bubble.show { opacity:1; transform:none; }
  /* PC view (>= 480px): narrow bubble on bottom-right */
  @media (min-width: 480px) {
    #bubble { left:auto; right:14px; max-width:340px; }
  }
  #suggestions {
    display:none;   /* hidden per user request 2026-06-12 */
    position:absolute; left:10px; right:10px; top:50%;
    flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:auto;
  }
  #suggestions .sg-label {
    width:100%; text-align:center; font-size:11px; font-weight:600; color:#fff; letter-spacing:.3px;
    text-shadow:0 1px 4px rgba(0,0,0,.55); margin-bottom:2px;
  }
  .sugg {
    appearance:none; cursor:pointer; white-space:nowrap;
    background:rgba(255,255,255,.92); color:var(--brand); border:1px solid rgba(91,84,232,.22);
    border-radius:999px; font-size:12px; font-weight:600; padding:6px 12px;
    box-shadow:0 3px 10px rgba(0,0,0,.16); transition:transform .12s, background .15s;
  }
  .sugg:hover { background:#fff; transform:translateY(-1px); }
  .sugg:active { transform:scale(.96); }
  .sugg:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  #direct-warn {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#f4f6f8; color:#556; font-size:15px; text-align:center; padding:24px;
  }
  #debug-hud {
    display:none;
    position:absolute; left:8px; top:8px; width:300px; height:160px;
    background:rgba(0,0,0,.78); color:#0f0; font:10.5px/1.35 ui-monospace,monospace;
    border-radius:6px; padding:6px 8px; overflow-y:auto; overflow-x:hidden;
    pointer-events:auto; cursor:grab;
    white-space:pre-wrap; word-break:break-all; z-index:99;
  }
  #debug-hud::-webkit-scrollbar { width:6px; }
  #debug-hud::-webkit-scrollbar-thumb { background:rgba(0,255,0,.4); border-radius:3px; }
  #debug-hud-head {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;
    padding-bottom:4px; border-bottom:1px solid rgba(0,255,0,.25);
    font-weight:bold; color:#ffeb3b; pointer-events:auto;
  }
  #debug-hud-toggle, #debug-hud-clear {
    background:rgba(255,255,255,.12); border:0; color:#fff; cursor:pointer;
    font-size:10px; padding:1px 6px; border-radius:3px; margin-left:4px;
  }
  #debug-hud-toggle:hover, #debug-hud-clear:hover { background:rgba(255,255,255,.25); }
  #debug-hud.collapsed { height:auto; min-height:22px; }
  #debug-hud.collapsed #debug-hud-body { display:none; }

  /* ===== Voice list popover (anchored to btn-voice) ===== */
  #voice-list, #emote-list {
    position:absolute; left:8px; right:8px; bottom:calc(100% + 8px);
    background:var(--surface); color:var(--ink);
    border-radius:14px; padding:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.22), inset 0 0 0 1px rgba(91,84,232,.18);
    max-height:50vh; overflow-y:auto; z-index:99;
    display:none;   /* toggled by .open */

  #voice-list.open, #emote-list.open { display:block; }
  #voice-list .vl-header, #emote-list .vl-header {
    font-size:12px; font-weight:600; color:#666; padding:6px 10px 4px;
    border-bottom:1px solid #eef0f4; margin-bottom:4px;
    display:flex; justify-content:space-between; align-items:center;
  }
  #voice-list .vl-empty, #emote-list .vl-empty {
    padding:14px 10px; text-align:center; font-size:12px; color:#888;
  }
  #voice-list .vl-item, #emote-list .vl-item {
    display:flex; flex-direction:column; gap:1px;
    padding:8px 10px; border-radius:9px; cursor:pointer;
    font-size:13.5px; line-height:1.3;
  }
  #voice-list .vl-item:hover, #emote-list .vl-item:hover { background:rgba(91,84,232,.08); }
  #voice-list .vl-item.active, #emote-list .vl-item.active { background:linear-gradient(135deg,var(--brand-2),var(--brand)); color:#fff; }
  #voice-list .vl-item .vl-name, #emote-list .vl-item .vl-name { font-weight:600; }
  #voice-list .vl-item .vl-id, #emote-list .vl-item .vl-id { font-size:11px; opacity:.65; font-family:ui-monospace,monospace; }

  #voice-list .vl-section, #emote-list .vl-section {
    font-size:11px; font-weight:700; color:var(--brand);
    padding:10px 10px 4px; letter-spacing:.3px;
    text-transform:uppercase;
  }

  <script>
    (function() {
      var body = null;
      function ensure() {
        if (!body) {
          body = document.getElementById('debug-hud-body');
          document.getElementById('debug-hud-clear').addEventListener('click', function(e) {
            e.stopPropagation(); body.textContent = '';
          });
          document.getElementById('debug-hud-toggle').addEventListener('click', function(e) {
            e.stopPropagation();
            var hud = document.getElementById('debug-hud');
            hud.classList.toggle('collapsed');
            this.textContent = hud.classList.contains('collapsed') ? '+' : '−';
          });
        }
        return body;
      }
      function fmt(args) {
        return Array.from(args).map(function(a) {
          if (a instanceof Error) return a.message;
          if (typeof a === 'object') { try { return JSON.stringify(a).slice(0, 300); } catch (e) { return String(a); } }
          return String(a);
        }).join(' ');
      }
      function push(prefix, args) {
        var b = ensure(); if (!b) return;
        var line = prefix + ' ' + fmt(args);
        b.textContent += line + '\n';
        var lines = b.textContent.split('\n');
        if (lines.length > 80) b.textContent = lines.slice(-80).join('\n');
        var hud = document.getElementById('debug-hud');
        hud.scrollTop = hud.scrollHeight;
      }
      var origLog = console.log, origWarn = console.warn, origErr = console.error;
      console.log   = function() { push('[log]',   arguments); origLog.apply(console, arguments); };
      console.warn  = function() { push('[warn]',  arguments); origWarn.apply(console, arguments); };
      console.error = function() { push('[ERR!]',  arguments); origErr.apply(console, arguments); };
    })();
  </script>

  // Per user report #17072: Microsoft Edge for Android (com.microsoft.emmx) exposes
  // webkitSpeechRecognition but lacks Google Play Services speech backend, causing
  // 'not-allowed' on every mic click. Same applies to Firefox, Brave, Samsung Internet
  // on Android. We detect Chrome (incl. Android WebView) and disable mic for others.
  const BROWSER = (function () {
    const ua = (navigator.userAgent || '').toLowerCase();
    const isAndroid = /android/.test(ua);
    const isIOS = /iphone|ipad|ipod/.test(ua);
    const isCriOS = /crios\//.test(ua);   // Chrome for iOS (uses WebKit, SR also limited)
    const isEdge = /edg\//.test(ua) || /edga\//.test(ua);
    const isFirefox = /firefox\//.test(ua);
    const isSamsung = /samsungbrowser\//.test(ua);
    const isBrave = /brave\//.test(ua);
    const isOpera = /opera\//.test(ua) || /opr\//.test(ua);
    // Chrome proper: 'Chrome/' (desktop + Android) but not CriOS/Edge/Opera/Samsung
    const isChrome = /chrome\//.test(ua) && !isCriOS && !isEdge && !isOpera && !isSamsung && !isBrave;
    const isIOSChrome = isIOS && isCriOS;
    const isIOSWebkit = isIOS && /safari\//.test(ua) && !isCriOS;  // Safari + all iOS browsers (forced WebKit)
    return {
      ua, isAndroid, isIOS,
      isChrome, isEdge, isFirefox, isSamsung, isBrave, isOpera, isCriOS,
      isIOSChrome, isIOSWebkit,
      // SpeechRecognition actually works on:
      // - Desktop Chrome / Edge (uses Google backend via network)
      // - Android Chrome (uses Google App via Google Play Services)
      // - iOS Chrome: technically exposes SR but iOS limits WebKit speech to short
      //   phrases and it's unreliable. Treat as unsupported.
      // - iOS Safari: not supported.
      // 2026-06-13 v11: any browser with SR API gets to try (per user #17226 evidence
      // that hard-blocking Brave/Edge silently returns 'non-Chrome' hint but user
      // never sees the hint and thinks mic is broken). Real failure path is
      // captured by onerror → 'not-allowed' / 'service-not-allowed'.
      srSupported: !!SR
    };
  })();
  // Expose for debugging
  try { window.__BROWSER = BROWSER; } catch (e) {}
  const isEmbedded = window.self !== window.top;
  const devBypass  = new URLSearchParams(location.search).has('dev');
  if (!isEmbedded && !devBypass) {
    document.getElementById('stage').style.display = 'none';
    document.getElementById('direct-warn').style.display = 'flex';
  } else {
    bootAvatar();
  }

  function postToParent(type, payload) {
    try { window.parent.postMessage(Object.assign({ ns: 'avatar-widget', type }, payload || {}), '*'); } catch (e) {}
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.ns !== 'avatar-widget-host') return;
    if (d.type === 'say') speak(String(d.text || '').slice(0, 600));
  });

  function showBubble(text) {
      // 2026-06-13 v3: log every bubble call for diagnostic
      try {
        console.log('[bubble]', JSON.stringify({
          ts: Date.now(),
          text: String(text || '').slice(0, 200),
          visible: !!document.querySelector('.bubble')?.classList.contains('show')
        }));
      } catch (e) {}
      
    const b = document.getElementById('bubble');
    b.textContent = text; b.classList.add('show');
    positionBubble();   // re-pin to control bar (handles button-wrap height changes)
    clearTimeout(showBubble._t);
    showBubble._t = setTimeout(() => b.classList.remove('show'), 6000);
  }

  // Pin the bubble just above the control bar so it never collides with
  // 1-3 rows of wrapped buttons. Recalculated on resize and on every
  // showBubble() call to handle dynamic layout changes.
  function positionBubble() {
    const bar = document.getElementById('control-bar');
    const bubble = document.getElementById('bubble');
    const stage = document.getElementById('stage');
    if (!bar || !bubble || !stage) return;
    const barRect = bar.getBoundingClientRect();
    const stageRect = stage.getBoundingClientRect();
    const gap = 8;
    const bottomVal = (stageRect.height - barRect.top + gap) + 'px';
    bubble.style.bottom = bottomVal;

    // 同步更新彈出選單的底部位置，避免定位在螢幕上方不可見
    const voicePopover = document.getElementById('voice-list');
    if (voicePopover) voicePopover.style.bottom = bottomVal;
    const emotePopover = document.getElementById('emote-list');
    if (emotePopover) emotePopover.style.bottom = bottomVal;
  }
  window.addEventListener('resize', positionBubble);
  window.addEventListener('load', positionBubble);

  function loadVoice() {
    const vs = speechSynthesis.getVoices();
    const pick = (re) => vs.find(v => re.test(v.name + ' ' + v.lang) && !/Google/i.test(v.name));
    ttVoice =
         pick(/(HsiaoChen|HsiaoYu|曉臻|曉雨).*zh/i)
      || pick(/(Yating|Zhiwei).*zh[-_]TW/i)
      || pick(/Microsoft.*zh[-_]TW/i)
      || pick(/zh[-_]TW/i)
      || pick(/^zh/i)
      || vs.find(v => /zh/i.test(v.lang))
      || null;
  }
  if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }

  function stopSpeaking() {
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { clearInterval(speakBrowser._poll); } catch (e) {}
    if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    isSpeaking = false; useAudioMouth = false; audioMouth = 0;
  }

  // Smart truncation: if text is over the soft cap, cut at the last sentence
  // boundary so TTS never gets a mid-sentence garbled cut. Bubble keeps the full text.
  function _ttsTruncate(text, softCap) {
    softCap = softCap || 120;
    if (text.length <= softCap) return text;
    // Look for the last sentence-ending punctuation within the soft cap
    var lastEnd = -1;
    for (var i = 0; i < softCap; i++) {
      var c = text.charAt(i);
      if (c === '。' || c === '！' || c === '?' || c === '?' || c === '!' || c === ';') {
        lastEnd = i;
      }
    }
    if (lastEnd > 20) return text.slice(0, lastEnd + 1);
    // No sentence boundary found: hard-cut at softCap, drop the trailing partial char
    return text.slice(0, softCap);
  }

  function applyKeywordsTrigger(text) {
    if (!text) return;
    const base = currentSentenceEmotion || 'neutral';
    // 2026-06-12 16:59: gestures now use independent Set-style tracking so multiple
    // gestures (e.g. 刀+唱 → knife + mc) can be active simultaneously. Previously
    // emoteState.gesture was a single string and the if-else chain at the bottom
    // overwrote it on each pass, so only one gesture was ever active.
    // Backward-compat: keep emoteState.gesture (string) for code that still reads it,
    // but the source of truth is emoteState.gestures (object of booleans).
    emoteState.gesture = 'normal';
    emoteState.gestures = { knife: false, mc: false, mouse: false, click: false };
    emoteState.bloodFace = false;
    emoteState.bloodBody = false;

    if (base === 'happy') {
      emoteState.eyes = 'hearteyes';
      emoteState.blush = false;
      emoteState.tears = false;
      emoteState.angry = false;
    } else if (base === 'sad') {
      emoteState.eyes = 'normal';
      emoteState.blush = false;
      emoteState.tears = true;
      emoteState.angry = false;
    } else if (base === 'angry') {
      emoteState.eyes = 'normal';
      emoteState.blush = false;
      emoteState.tears = false;
      emoteState.angry = true;
    } else if (base === 'shy') {
      emoteState.eyes = 'normal';
      emoteState.blush = true;
      emoteState.tears = false;
      emoteState.angry = false;
    } else if (base === 'surprised') {
      emoteState.eyes = 'circleeyes';
      emoteState.blush = false;
      emoteState.tears = false;
      emoteState.angry = false;
    } else {
      emoteState.eyes = 'normal';
      emoteState.blush = false;
      emoteState.tears = false;
      emoteState.angry = false;
    }

    const t = text.toLowerCase();
    const has = (words) => words.some(w => t.includes(w));

    // 擴展的關鍵詞詞庫
    // 1. 手勢道具
    const kKnife = ['小刀', '匕首', '刺', '切', '殺', '割', '🔪', '武器', '危險', '刀子', '防身', '攻擊', '砍', '捅', '威脅', '動手', '決鬥', '死', '命案', '刀', 'knife', 'dagger', 'sword', 'attack', 'kill'];
    const kMc = ['麥克風', '話筒', '唱歌', '歌唱', '主持', '🎤', '音樂', '唱首歌', '歌聲', '演講', '播音', '發言', '廣播', '表演', '歌手', '🎵', '🎶', '唱', '歌', 'sing', 'song', 'microphone', 'mic', 'music'];
    const kMouse = ['滑鼠', '電腦', '🖱️', '游標', '控制', '滑鼠裝備', '雙擊', '螢幕', '鍵盤', '打字', '寫程式', '編程', '代碼', 'coding', '上網', '衝浪', '網頁', 'mouse', 'computer', 'keyboard', 'code', 'program'];
    const kClick = ['戳', '點', '按', '👆', '指', '碰', '摸', '觸', '點擊', '按鈕', '選擇', '確定', '送出', 'click', 'press', 'touch', 'point'];

    // 2. 特殊眼部
    const kHeartEyes = ['愛心', '喜歡', '愛你', '心動', '😍', '❤️', '中意', '愛慕', '心心', '好帥', '好美', '心跳', '告白', '表白', '寶貝', '親愛的', '心儀', '可愛', '漂亮', '迷人', '老公', '老婆', 'love', 'like', 'heart', 'cute', 'sweet', 'crush'];
    const kCircleEyes = ['暈', '呆', '轉圈', '混亂', '眩', '🌀', '懵', '頭暈', '暈厥', '迷糊', '發呆', '不知所措', '困惑', '不懂', '搞不懂', '看不懂', '難題', '複雜', '茫', 'dizzy', 'faint', 'confused', 'stunned', 'blank'];
    const kStarEyes = ['星星', '閃亮', '崇拜', '羨慕', '🤩', '✨', '期待', '偶像', '好厲害', '太強了', '好棒', '盼望', '許願', '閃耀', '亮晶晶', 'star', 'shine', 'admire', 'expect', 'wish'];

    // 3. 面部效果
    const kBlush = ['害羞', '紅暈', '臉紅', '不好意思', '😳', '討厭啦', '撒嬌', '純情', '內向', '緊張', '尷尬', '拍謝', 'shy', 'blush', 'embarrassed', 'nervous'];
    const kTears = ['流淚', '哭', '傷心', '難過', '委屈', '😭', '😢', '嗚嗚', '悲傷', '哀傷', '好慘', '泣', '桑心', '崩潰', '失落', '沮喪', '痛哭', '眼淚', 'cry', 'tear', 'sad', 'sob', 'breakdown', 'depressed'];
    const kAngry = ['生氣', '青筋', '憤怒', '惱火', '不爽', '😠', '😡', '閉嘴', '發飆', '抓狂', '暴怒', '火大', '生氣氣', '氣死', '討厭你', 'angry', 'mad', 'furious', 'pissed', 'annoyed', 'shut up'];

    // 4. 血跡效果
    const kBlood = ['臉部血跡', '臉上有血', '胸口血跡', '身上有血', '受傷', '流血', '🩸', '血跡', '吐血', '流鼻血', '割傷', '刺傷', '血腥', 'blood', 'bleed', 'hurt', 'wound', 'injury', 'bloody'];

    // 2026-06-12 16:59: 4 independent flags instead of if-else chain.
    // Now emoteState.gestures.knife + emoteState.gestures.mc can BOTH be true
    // for a sentence that contains both 刀 and 唱 — the param-setter below
    // lights up PARAMhands_1 (mc) AND PARAMhands_2 (knife) at the same time.
    if (has(kKnife)) { emoteState.gestures.knife = true; emoteState.gesture = 'knife'; }
    if (has(kMc))    { emoteState.gestures.mc = true;    emoteState.gesture = emoteState.gesture === 'normal' ? 'mc'    : emoteState.gesture; }
    if (has(kMouse)) { emoteState.gestures.mouse = true; emoteState.gesture = emoteState.gesture === 'normal' ? 'mouse' : emoteState.gesture; }
    if (has(kClick)) { emoteState.gestures.click = true; emoteState.gesture = emoteState.gesture === 'normal' ? 'click' : emoteState.gesture; }

    // 2026-06-12 16:59: independent flags for eye modes too — if a sentence
    // has both 心動 and 暈, you get hearteyes + circleeyes simultaneously.
    if (has(kHeartEyes))  emoteState.eyes = 'hearteyes';
    if (has(kCircleEyes)) emoteState.eyes = emoteState.eyes === 'normal' ? 'circleeyes' : emoteState.eyes;
    if (has(kStarEyes))   emoteState.eyes = emoteState.eyes === 'normal' ? 'stareyes'   : emoteState.eyes;

    if (has(kBlush)) emoteState.blush = true;
    if (has(kTears)) emoteState.tears = true;
    if (has(kAngry)) emoteState.angry = true;

    if (has(kBlood)) {
      emoteState.bloodFace = true;
      emoteState.bloodBody = true;
    }

    if (typeof updateEmoteListActiveUI === 'function') {
      updateEmoteListActiveUI();
    }
  }

  function speak(text) {
    // Defense in depth: strip any leftover emotion tags from the TTS-bound text.
    // The streaming engine already strips them, but hard-coded callers and any
    // post-streaming retry paths should never leak tags like <neutral> to TTS.
    var stripped = String(text || '').replace(/<\s*(?:neutral|happy|sad|angry|surprised|shy|thinking)\s*>/gi, '').trim();
    if (!stripped) return;
    applyKeywordsTrigger(stripped);
    // TTS-bound copy is smart-truncated; bubble can show the full stripped text.
    var ttsText = _ttsTruncate(stripped, 120);
    const myseq = ++speakSeq;
    showBubble(stripped);
    postToParent('speaking', { text: stripped });
    if (ttsMuted) return;
    stopSpeaking();
    if (ttsMode === 'neural' && !neuralDisabled) {
      // 2026-06-12 BAZOOKA-free: if user wants neural but no key, prompt now.
      if (!MINIMAX_TTS_KEY) {
        pendingNeuralToggle = true;
        openMinimaxKeyModal();
        return;  // wait for user to input key, don't fall back to browser
      }
      speakNeural(ttsText, myseq).catch((e) => {
        if (myseq !== speakSeq) return;  // 已被更新的點擊取代 → 不要退回播放
        const msg = (e && e.message) || '';
        if (/http 4\d\d|Failed to fetch|NetworkError|Load failed/i.test(msg)) neuralDisabled = true; // 結構性失敗(無後端/CORS/被擋)→不再試神經語音
        console.warn('神經語音失敗，退回瀏覽器語音：', msg);
        useAudioMouth = false;
        speakBrowser(ttsText);
      });
      return;
    }
    speakBrowser(ttsText);
  }

  // 2026-06-12: Direct MiniMax TTS API call (BAZOOKA-free).
  // Uses user's localStorage-stored API key + group_id. Returns a Response-like
  // object containing the audio bytes (mp3) ready for Web Audio decodeAudioData.
  //
  // NOTE: MiniMax T2A v2 returns JSON with base64 audio unless stream=true is set.
  // For low-latency widget playback we use stream=true (hex chunks via SSE).
  // This implementation uses the simpler non-streaming JSON form first (more
  // compatible across MiniMax T2A v2 deployments); switching to streaming
  // chunked is a future optimization.
  async function fetchMinimaxTtsDirect(text) {
    if (!MINIMAX_TTS_KEY) throw new Error('MiniMax API key missing');
    if (!MINIMAX_GROUP_ID) {
      throw new Error('MiniMax Group ID missing — open settings (🔑) to set it');
    }
    const voiceId = NEURAL_VOICE || 'cantonese-female';
    // 2026-06-12 17:12 FIX: align with BAZOOKA backend (backend/app.py /api/tts
    // proven payload) — model was 'speech-02' but MiniMax T2A v2 requires
    // 'speech-02-hd' for non-empty data.audio response. Also drop the unsupported
    // 'vol' / 'pitch' fields from voice_setting (they caused silent
    // data.audio omission in the new MiniMax T2A v2 build). Use snake_case
    // group_id query param to match the documented endpoint signature.
    const body = {
      model: 'speech-02-hd',
      text: String(text || '').slice(0, 150),   // hard cap 150 chars (matches BAZOOKA)
      stream: false,
      voice_setting: {
        voice_id: voiceId,
        speed: 1.0
      },
      audio_setting: {
        sample_rate: 32000,
        format: 'mp3',
        bitrate: 128000,
        channel: 1
      }
    };
    const r = await fetch(MINIMAX_TTS_DIRECT + '?group_id=' + encodeURIComponent(MINIMAX_GROUP_ID), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + MINIMAX_TTS_KEY
      },
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      const errText = await r.text().catch(() => '');
      throw new Error('http ' + r.status + ' ' + (errText.slice(0, 200) || ''));
    }
    const j = await r.json();
    // 2026-06-12 17:12 FIX: also check base_resp.status_code (BAZOOKA-style)
    // before trusting data.audio. MiniMax returns 200 OK with empty data
    // when the voice_id is wrong / deprecated / group_id mismatch — the
    // base_resp.status_code carries the actual error in those cases.
    if (j && j.base_resp && j.base_resp.status_code !== undefined && j.base_resp.status_code !== 0) {
      const msg = j.base_resp.status_msg || ('MiniMax error ' + j.base_resp.status_code);
      throw new Error('MiniMax voice error: ' + msg + ' (voice_id=' + voiceId + ')');
    }
    if (j && j.data && j.data.audio) {
      // hex-encoded audio
      const hex = j.data.audio;
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
      }
      return new Response(bytes, { status: 200, headers: { 'Content-Type': 'audio/mpeg' } });
    }
    throw new Error('MiniMax T2A response missing data.audio (model=' + body.model + ', voice=' + voiceId + ')');
  }

  async function speakNeural(text, seq) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch (e) {} }
    // 2026-06-12 BAZOOKA-free deployment: dispatch to direct MiniMax API call
    // when a user-supplied API key is present, otherwise fall back to the
    // legacy /api/tts proxy path (for self-hosted deployments).
    let resp;
    if (MINIMAX_TTS_KEY) {
      resp = await fetchMinimaxTtsDirect(text);
    } else {
      const sep = TTS_ENDPOINT.indexOf('?') < 0 ? '?' : '&';
      resp = await fetch(TTS_ENDPOINT + sep + 'voice=' + encodeURIComponent(NEURAL_VOICE) + '&text=' + encodeURIComponent(text));
    }
    if (seq !== speakSeq) return;
    if (!resp.ok) throw new Error('http ' + resp.status);
    const arr = await resp.arrayBuffer();
    if (seq !== speakSeq) return;
    if (arr.byteLength < 800) throw new Error('audio too small');
    const audioBuf = await audioCtx.decodeAudioData(arr);
    if (seq !== speakSeq) return;
    const src = audioCtx.createBufferSource(); src.buffer = audioBuf;
    const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
    src.connect(analyser); analyser.connect(audioCtx.destination);
    const data = new Uint8Array(analyser.fftSize);
    currentSource = src;
    useAudioMouth = true; isSpeaking = true;
    if (model) try { model.motion('Tap'); restoreOutfitFromEmoteState(); } catch (e) {}
    const loop = () => {
      if (currentSource !== src) return;
      analyser.getByteTimeDomainData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
      audioMouth = Math.min(1, Math.sqrt(sum / data.length) * 3.4);
      currentRaf = requestAnimationFrame(loop);
    };
    currentRaf = requestAnimationFrame(loop);
    src.onended = () => {
      if (currentSource !== src) return;
      if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
      isSpeaking = false; useAudioMouth = false; audioMouth = 0;
      currentSource = null;
    };
    src.start(0);
  }

  function speakBrowser(text) {
    if (ttsMuted || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    if (!ttVoice) loadVoice();
    if (ttVoice) u.voice = ttVoice;
    u.lang = (ttVoice && ttVoice.lang) || 'zh-TW';
    u.rate = ttsRate; u.pitch = 1.0;
    u.onboundary = () => { mouthTarget = 0.5 + Math.random() * 0.5; };
    u.onend = () => { isSpeaking = false; clearInterval(speakBrowser._poll); };
    const fire = () => {
      speechSynthesis.speak(u);
      isSpeaking = true; mouthTarget = 0.7; if (model) try { model.motion('Tap'); restoreOutfitFromEmoteState(); } catch (e) {}
      const t0 = performance.now();
      clearInterval(speakBrowser._poll);
      speakBrowser._poll = setInterval(() => {
        const elapsed = performance.now() - t0;
        const active = speechSynthesis.speaking || speechSynthesis.pending;
        if ((elapsed > 1000 && !active) || elapsed > 16000) { isSpeaking = false; clearInterval(speakBrowser._poll); }
      }, 150);
    };
    if (speechSynthesis.speaking || speechSynthesis.pending) { speechSynthesis.cancel(); setTimeout(fire, 130); }
    else fire();
  }

  function bigrams(s) {
    s = (s || '').toLowerCase().replace(/[\s，。、？！,.?!~～]/g, '');
    const g = [];
    for (let i = 0; i < s.length - 1; i++) g.push(s.slice(i, i + 2));
    if (s.length === 1) g.push(s);
    return g;
  }
  function similarity(query, text) {
    const A = bigrams(query), B = new Set(bigrams(text));
    if (!A.length || !B.size) return 0;
    let hit = 0; for (const x of A) if (B.has(x)) hit++;
    return hit / Math.sqrt(A.length * B.size);
  }
  function scoreEntry(q, e) {
    let score = Math.max(similarity(q, e.q), similarity(q, e.kw || ''));
    const terms = (e.kw || '').split(/\s+/).filter(Boolean);
    for (const t of terms) { if (t.length >= 2 && q.includes(t)) score = Math.max(score, 0.5 + t.length * 0.04); }
    return score;
  }
  function topK(q, k) {
    return (window.KB || []).map(e => ({ e, s: scoreEntry(q, e) }))
      .sort((a, b) => b.s - a.s).slice(0, k).filter(x => x.s > 0.05).map(x => x.e);
  }
  function brain(qRaw) {
    const q = (qRaw || '').trim();
    if (!q) return '我好像沒聽清楚，可以再說一次嗎？';
    let best = null, bestScore = 0;
    for (const e of (window.KB || [])) { const s = scoreEntry(q, e); if (s > bestScore) { bestScore = s; best = e; } }
    if (best && bestScore >= 0.16) return best.a;

  // =====================================================================
  // 核心增強：DeepSeek 多模態實時流式解析狀態機
  // =====================================================================
  const DEEPSEEK_STREAM_ENGINE = (function() {
    // Streaming parser for DeepSeek chat completions. The model emits inline emotion
    // tags like `<happy>` interleaved with the narrative text, sometimes split across
    // multiple tokens. We need to:
    //   1) Fire `trigger(emo)` once per COMPLETE tag
    //   2) Strip all tags (complete + partial) from the text the user sees/hears
    //   3) Return only the NEW clean text delta each call
    //
    // Implementation note (2026-06-12 fix):
    //   The previous design trimmed the buffer to the trailing partial tag, which
    //   caused clean text to shrink across calls (clean was computed from the
    //   trimmed buffer, losing prefix characters that hadn't been "emitted" yet).
    //   Now we keep the FULL clean text and just remember what we've emitted.
    var _clean = '';          // cumulative clean text (post-tag-strip)
    var _emitted = '';        // suffix of _clean that has already been returned
    var _pendingTail = '';    // unclosed tag-like prefix held across calls
    var _watchdog = null;

    function clearEmotionMatrix() {
      if (!window.KNOWLEDGE) return;
      var pins = [
        'PARAM_MOUTH_FORM', 'PARAM_EYE_L_OPEN', 'PARAM_EYE_R_OPEN',
        'PARAM_ANGLE_X', 'PARAM_ANGLE_Y', 'PARAM_BROW_L_Y', 'PARAM_BROW_R_Y',
        'PARAM_BROW_L_FORM', 'PARAM_BROW_R_FORM', 'PARAMTEARS', 'PARAMANGRY', 'PARAMSHY'
      ];
      var resetMap = {};
      pins.forEach(function(p) { resetMap[p] = 0.0; });
      window.KNOWLEDGE.bulkSet(resetMap);
    }

    function trigger(emo) {
      if (_watchdog) clearTimeout(_watchdog);
      clearEmotionMatrix();
      if (typeof applyEmotion === 'function') {
        applyEmotion(emo);
      }
      // 生理超時自銷毀安全鎖：8 秒後自動淡出，防範 AI 網路斷線定格崩潰
      _watchdog = setTimeout(function() {
        clearEmotionMatrix();
      }, 8000);
    }

    // Strip complete + partial emotion tags from raw input.
    //   - `<happy>`     → '' (complete)
    //   - `<neu`        → '' (partial, awaiting 'tral>')
    //   - `5 < 3`       → `5 < 3` (NOT a tag; we don't touch it)
    //   - bare `<`      → `<` (NOT a tag until we see letters)
    // Use a function-based check so bare '<' or '< 3' is never stripped.
    var VALID = ['neutral', 'happy', 'sad', 'angry', 'surprised', 'shy', 'thinking'];
    var COMPLETE_TAG_RE = new RegExp('<(' + VALID.join('|') + ')>', 'g');
    function isPartialTagBody(body) {
      // body: the text AFTER '<'. Returns true if body is all-lowercase letters
      // AND is a prefix of one of the valid emotion names.
      return /^[a-z]+$/.test(body) && VALID.some(function(v) { return v.indexOf(body) === 0; });
    }
    function stripTags(raw) {
      // Replace `<name>` (complete) and `<name...` (partial, no '>') with ''.
      // We do this with a manual scan to avoid the regex over-matching bare '<'.
      var out = '';
      var i = 0;
      while (i < raw.length) {
        if (raw.charAt(i) === '<' && i + 1 < raw.length) {
          // Try to read the tag body
          var j = i + 1;
          while (j < raw.length && /[a-z]/.test(raw.charAt(j))) j++;
          var body = raw.slice(i + 1, j);
          // Check if it's a complete or partial emotion tag
          if (j < raw.length && raw.charAt(j) === '>') {
            // Complete tag candidate
            if (VALID.indexOf(body) >= 0) { i = j + 1; continue; }
            // Not a known tag — keep the '<' as-is, advance by 1
            out += raw.charAt(i); i++;
          } else if (isPartialTagBody(body)) {
            // Partial tag (e.g. '<neu' where body is prefix of 'neutral')
            // Skip the entire partial
            i = j;
            continue;
          } else {
            // Looks like a stray '<' (e.g. '5 < 3') — keep as-is
            out += raw.charAt(i); i++;
          }
        } else {
          out += raw.charAt(i); i++;
        }
      }
      return out;
    }
    function fireCompleteTags(raw) {
      var re = new RegExp('<(' + VALID.join('|') + ')>', 'g');
      var m;
      while ((m = re.exec(raw)) !== null) trigger(m[1]);
    }

    return {
      reset: function() {
        _clean = ''; _emitted = ''; _pendingTail = '';
        if (_watchdog) clearTimeout(_watchdog);
        clearEmotionMatrix();
      },
      parseToken: function(token) {
        if (!token) return '';
        // Combine pending tail (unclosed tag from prior call) with new token
        var combined = _pendingTail + token;
        _pendingTail = '';

        // Detect an unclosed partial tag at the end. Scan forward from the
        // last '<' to find where the tag body ends (next non-letter or EOL).
        // If it looks like a partial emotion tag, hold it.
        var lastLt = combined.lastIndexOf('<');
        if (lastLt >= 0) {
          var lastGt = combined.lastIndexOf('>');
          if (lastGt < lastLt) {
            // There's a '<' with no '>' after it. Determine tag body length.
            var end = lastLt + 1;
            while (end < combined.length && /[a-z]/.test(combined.charAt(end))) end++;
            var body = combined.slice(lastLt + 1, end);
            // If body is a prefix of any valid emotion name, hold the tail.
            if (isPartialTagBody(body) && body.length > 0) {
              _pendingTail = combined.slice(lastLt);
              combined = combined.slice(0, lastLt);
            }
            // Else: not a tag, fall through and process normally.
          }
        }

        // Fire complete emotion tags in the processed text
        fireCompleteTags(combined);
        // Strip all tags (complete ones + stray partials that snuck through)
        var stripped = stripTags(combined);
        // Append to cumulative clean text
        _clean += stripped;
        // Safety: if _emitted isn't a prefix of _clean, just emit everything.
        if (_emitted && _clean.indexOf(_emitted) !== 0) _emitted = '';
        var delta = _clean.slice(_emitted.length);
        _emitted = _clean;
        return delta;
      }
    };
  })();

  async function handleDeepSeekStream(text) {
    DEEPSEEK_STREAM_ENGINE.reset();
    showBubble('🧛 思考中…');

    // Hard cap on streamed output so we never accumulate more than what TTS can speak.
    // TTS endpoint caps at 150 chars; bubble can show a bit more for legibility, but
    // anything past this is dropped from the stream to prevent mid-sentence audio cuts.
    const STREAM_TEXT_CAP = 200;   // streaming buffer cap (post-strip)
    const STREAM_END_MARKERS = ['。', '！', '？', '?', '!', '!', '~'];  // stop at first sentence boundary (fullwidth + halfwidth)
    let streamEnded = false;

    try {
      const response = await fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + DEEPSEEK_KEY
        },
        body: JSON.stringify({
          model: 'deepseek-chat',
          // Hard cap on output tokens (~150 Chinese chars). DeepSeek default is 8192.
          max_tokens: 200,
          // Lower temperature for more deterministic, less garbled output.
          temperature: 0.7,
          messages: [
            { role: 'system', content: '你是網頁右下角的吸血鬼少女助手。你傲嬌、毒舌但內心體貼。\n回應規則（請嚴格遵守）：\n1. 繁體中文，台灣用語。\n2. 字數 80–120 個字以內，最多三句。\n3. 句首內聯情感標籤，每段回應最少 1 個：<happy> <sad> <angry> <surprised> <shy> <thinking> <neutral>。\n4. 只用一個標籤在開頭。不要在句子中間切換情緒。\n5. 不要用英文、不要用簡體字、不要使用 Markdown、表情符號或代碼區塊。\n範例：<angry>哈？這種簡單的事情你竟然都不懂！<shy>真拿你沒辦法...' },
            { role: 'user', content: text }
          ],
          stream: true
        })
      });

      if (!response.ok) throw new Error('API 返回 HTTP ' + response.status);

      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let accumulatedCleanText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          var cleanLine = line.trim();
          if (!cleanLine || !cleanLine.startsWith('data: ')) continue;
          if (cleanLine.includes('[DONE]')) break;

          try {
            var rawJson = cleanLine.slice(6);
            var parsed = JSON.parse(rawJson);
            var token = parsed.choices[0].delta.content || '';
            if (token && !streamEnded) {
              var safeToken = DEEPSEEK_STREAM_ENGINE.parseToken(token);
              if (safeToken) {
                accumulatedCleanText += safeToken;
                document.getElementById('bubble').textContent = accumulatedCleanText;
                document.getElementById('bubble').classList.add('show');
                // Stop accumulating once we hit a sentence-ending punctuation past 30 chars.
                // Prevents runaway streams and ensures TTS gets a complete sentence.
                if (accumulatedCleanText.length > 50) {
                  var lastChar = accumulatedCleanText.slice(-1);
                  if (STREAM_END_MARKERS.indexOf(lastChar) >= 0) {
                    streamEnded = true;
                    try { reader.cancel(); } catch (e) {}
                    break;
                  }
                }
                if (accumulatedCleanText.length >= STREAM_TEXT_CAP) {
                  streamEnded = true;
                  try { reader.cancel(); } catch (e) {}
                  break;
                }
              }
            }
          } catch (e) {}
        }
        if (streamEnded) break;
      }

      if (accumulatedCleanText.trim()) {
        speak(accumulatedCleanText.trim());
      }
    } catch (err) {
      console.error('[DeepSeek API 錯誤]', err);
      speak('連接核心網路失敗：' + err.message);
    }
  }

            // every time a motion plays. This overwrites the outfit state set by the
            // render loop's safeSetParam on every frame.

        // 身體與肩膀晃動 (PARAM_BODY_ANGLE_X/Y/Z, PARAM_shoulder)
        let bodySwayX = Math.sin(t * 0.4) * 2.5;
        let bodySwayY = Math.cos(t * 0.3) * 1.5;
        if (isSpeaking) {
          // 說話時增加晃動幅度和頻率，讓身體顯得生動
          bodySwayX += Math.sin(t * 3.0) * 3.5;
          bodySwayY += Math.cos(t * 2.5) * 2.0;
          safeSetParam('PARAM_BODY_ANGLE_Z', Math.sin(t * 2.0) * 2.0);
          safeSetParam('PARAM_shoulder', Math.sin(t * 4.0) * 3.5);
        } else {
          safeSetParam('PARAM_BODY_ANGLE_Z', 0.0);
          safeSetParam('PARAM_shoulder', 0.0);
        }
        safeSetParam('PARAM_BODY_ANGLE_X', bodySwayX);
        safeSetParam('PARAM_BODY_ANGLE_Y', bodySwayY);

        // ─── 寫入全域 emoteState 外觀與表情參數 ───
        // 1. 服裝型態 (outfit)
        if (emoteState.outfit === 'vampire') {
          safeSetParam('PARAMoutfit1_2', 1.0);
          safeSetParam('PARAMhariWB', 1.0);
          safeSetParam('PARAMhariWB2', 0.0);
          safeSetParam('PARAMhari_7', 1.0);
          safeSetParam('PARAMhari_8', 1.0);
          safeSetParam('PARAMhari_3', 1.0);
        } else if (emoteState.outfit === 'vampire2') {
          safeSetParam('PARAMoutfit1_2', 0.0);
          safeSetParam('PARAMhariWB', 0.0);
          safeSetParam('PARAMhariWB2', 1.0);
          safeSetParam('PARAMhari_7', 1.0);
          safeSetParam('PARAMhari_8', 1.0);
          safeSetParam('PARAMhari_3', 0.0);
        }

        // 2. 手勢道具 (gesture) — 2026-06-12 16:59: independent flags so
        // PARAMhands_1 (mc) + PARAMhands_2 (knife) can both be 1.0 simultaneously.
        var _gs = emoteState.gestures || { knife: false, mc: false, mouse: false, click: false };
        safeSetParam('PARAMhands_1', _gs.mc    ? 1.0 : 0.0);
        safeSetParam('PARAMhands_2', _gs.knife ? 1.0 : 0.0);
        safeSetParam('PARAMhands_3', _gs.mouse ? 1.0 : 0.0);
        safeSetParam('Paramclick',   _gs.click ? 1.0 : 0.0);

        // 3. 特殊眼部 (eyes)
        safeSetParam('PARAMWHITEEYE', emoteState.eyes === 'circleeyes' ? 1.0 : 0.0);
        safeSetParam('PARAMhearteye', emoteState.eyes === 'hearteyes' ? 1.0 : 0.0);
        safeSetParam('PARAMstareye', emoteState.eyes === 'stareyes' ? 1.0 : 0.0);

        // 4. 臉部效果 (blush, tears, angry)
        safeSetParam('PARAMSHY', emoteState.blush ? 1.0 : 0.0);
        if (emoteState.tears) {
          safeSetParam('PARAMTEARS', 1.0);
          safeSetParam('PARAM_BROW_L_Y', -1.0);
          safeSetParam('PARAM_BROW_L_FORM', -1.0);
          safeSetParam('PARAM_BROW_R_FORM', -1.0);
          safeSetParam('PARAM_BROW_R_Y', -1.0);
        } else {
          safeSetParam('PARAMTEARS', 0.0);
        }
        safeSetParam('PARAMANGRY', emoteState.angry ? 1.0 : 0.0);

        // 5. 血跡效果 (bloodFace, bloodBody)
        safeSetParam('PARAMBLOOD2', emoteState.bloodFace ? 1.0 : 0.0);
        safeSetParam('PARAMblood1', emoteState.bloodBody ? 1.0 : 0.0);

        // 眨眼邏輯
        if (t - lastBlinkT > nextBlinkIn) {
          lastBlinkT = t;
          nextBlinkIn = 2.0 + Math.random() * 3.0;
        }
        const sinceBlink = t - lastBlinkT;
        let blinkVal = 1.0;
        if (sinceBlink < 0.15) {
          blinkVal = 0.0;
        } else if (sinceBlink < 0.25) {
          blinkVal = (sinceBlink - 0.15) / 0.10;
        }
        safeSetParam('PARAM_EYE_L_OPEN', blinkVal);
        safeSetParam('PARAM_EYE_R_OPEN', blinkVal);

        // 嘴巴張合邏輯：說話時隨機嘴型，沒說話時閉合
        const mouthTarget = useAudioMouth ? audioMouth : (isSpeaking ? (0.3 + Math.random() * 0.55) : 0);
        mouthValue += (mouthTarget - mouthValue) * 0.35;
        safeSetParam('PARAM_MOUTH_OPEN_Y', mouthValue);
      });

      const sg = [
        { q: '打招呼', t: '你好' },
        { q: '自我介紹', t: '這是什麼' },
        { q: '安裝', t: '怎麼安裝' },
        { q: '換皮', t: '怎麼換成你的角色' }

        sgel.appendChild(b);
      });

      setTimeout(() => speak('哈囉，我是吸血鬼，可以問我任何問題。'), 500);
    } catch (e) {
      console.error('Live2D load failed:', e);
    }
  }

        '<label style="display:block;margin-bottom:10px;font-size:12px;color:#456;font-weight:600;">Group ID</label>',
        '<input id="mk-group" type="text" autocomplete="off" placeholder="123456789012345678" style="width:100%;box-sizing:border-box;padding:8px 10px;border:1px solid #dde3e9;border-radius:8px;font-size:13px;font-family:ui-monospace,monospace;margin-bottom:6px;">',
        '<div id="mk-msg" style="min-height:18px;font-size:12px;margin-bottom:12px;"></div>',
        '<div style="display:flex;gap:8px;justify-content:flex-end;">',
          '<button id="mk-clear" style="padding:7px 14px;border:1px solid #dde3e9;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;">清除</button>',
          '<button id="mk-test" style="padding:7px 14px;border:1px solid #5b54e8;background:#fff;color:#5b54e8;border-radius:8px;font-size:13px;cursor:pointer;">測試</button>',
          '<button id="mk-save" style="padding:7px 14px;border:none;background:#5b54e8;color:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;">儲存</button>',
          '<button id="mk-cancel" style="padding:7px 14px;border:1px solid #dde3e9;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;">取消</button>',
        '</div>',
      '</div>'
    ].join('');
    document.body.appendChild(modal);
    const $key = modal.querySelector('#mk-key');
    const $group = modal.querySelector('#mk-group');
    const $msg = modal.querySelector('#mk-msg');
    $key.value = MINIMAX_TTS_KEY || '';
    $group.value = MINIMAX_GROUP_ID || '';
    $key.focus();
    function close() { modal.style.display = 'none'; }
    modal.querySelector('#mk-cancel').addEventListener('click', close);
    modal.querySelector('#mk-save').addEventListener('click', () => {
      const k = $key.value.trim();
      const g = $group.value.trim();
      if (!k) { $msg.innerHTML = '<span style="color:#c33;">API Key 唔可以空白</span>'; return; }
      if (!g) { $msg.innerHTML = '<span style="color:#c33;">Group ID 唔可以空白</span>'; return; }
      MINIMAX_TTS_KEY = k;
      MINIMAX_GROUP_ID = g;
      try { localStorage.setItem('minimax_tts_key', k); localStorage.setItem('minimax_group_id', g); } catch (e) {}
      $msg.innerHTML = '<span style="color:#2a7;">✓ 已儲存</span>';
      setTimeout(close, 600);
      if (pendingNeuralToggle) {
        pendingNeuralToggle = false;
        showBubble('MiniMax 神經語音已啟用 — 撳一下對話試試');
      }
    });
    modal.querySelector('#mk-clear').addEventListener('click', () => {
      $key.value = ''; $group.value = '';
      MINIMAX_TTS_KEY = '';
      MINIMAX_GROUP_ID = '';
      try { localStorage.removeItem('minimax_tts_key'); localStorage.removeItem('minimax_group_id'); } catch (e) {}
      $msg.innerHTML = '<span style="color:#888;">已清除</span>';
    });
    modal.querySelector('#mk-test').addEventListener('click', async () => {
      $msg.innerHTML = '<span style="color:#5b54e8;">測試中…</span>';
      const k = $key.value.trim();
      const g = $group.value.trim();
      if (!k || !g) { $msg.innerHTML = '<span style="color:#c33;">請先填寫 API Key + Group ID</span>'; return; }
      const oldKey = MINIMAX_TTS_KEY, oldGroup = MINIMAX_GROUP_ID;
      MINIMAX_TTS_KEY = k; MINIMAX_GROUP_ID = g;
      try {
        const r = await fetchMinimaxTtsDirect('測試');
        $msg.innerHTML = '<span style="color:#2a7;">✓ 連線成功</span>';
        try { await r.arrayBuffer(); } catch (e) {} // discard
      } catch (e) {
        MINIMAX_TTS_KEY = oldKey; MINIMAX_GROUP_ID = oldGroup;
        $msg.innerHTML = '<span style="color:#c33;">✗ ' + (e && e.message ? e.message.slice(0, 80) : '失敗') + '</span>';
      }
    });
  }
  // Expose for embed.js or test scripts
  window.__openMinimaxKeyModal = openMinimaxKeyModal;
  
    // 2026-06-13 v3: unhandled error capture during boot
    window.addEventListener('error', function (e) {
      try {
        const __err = {ts: Date.now(), msg: e.message, src: e.filename, line: e.lineno, col: e.colno, stack: (e.error && e.error.stack) ? String(e.error.stack).slice(0, 500) : null};
        console.error('[boot-error]', JSON.stringify(__err, null, 2));
        try { localStorage.setItem('xiaob_boot_diag', JSON.stringify(__err)); } catch (er) {}
      } catch (er) {}
    });
    window.addEventListener('unhandledrejection', function (e) {
      try {
        const __err = {ts: Date.now(), reason: String(e.reason), stack: (e.reason && e.reason.stack) ? String(e.reason.stack).slice(0, 500) : null};
        console.error('[boot-rejection]', JSON.stringify(__err, null, 2));
        try { localStorage.setItem('xiaob_boot_diag', JSON.stringify(__err)); } catch (er) {}
      } catch (er) {}
    });
</script>

name = "vampire-widget"
compatibility_date = "2024-11-01"
pages_build_output_dir = "./dist-pages"

# 2026-06-13 v14: disable Web Analytics auto-injection. Cloudflare Pages
# automatically injects a <script src="https://static.cloudflareinsights.com/...">
# tag into every HTML response, which on some mobile networks / browsers
# (Pixel 9 Android 15, China ROM, ad-blockers, corporate firewalls) returns
# net::ERR_ADDRESS_INVALID. This pollutes DevTools Network with an unfixable
# client-side error and adds ~20KB of unused analytics. Disabling is safe;
# we already log critical user-facing events via console.log + localStorage
# dumps, and production traffic analysis happens at the Cloudflare Zone
# level (DNS, not page-level beacon).
#
# Note: as of wrangler 4.99 this key is unknown ("Unexpected fields found
# in top-level field: 'web_analytics'") so the Pages platform itself does
# not yet honour it. The widget.html v28 patch strips the injected beacon
# client-side as a belt-and-suspenders measure. Once CF Pages adds a
# Dashboard toggle for Web Analytics auto-injection we can disable it
# there and remove the client-side strip.
#
# Reference: https://developers.cloudflare.com/pages/functions/web-analytics/
web_analytics = false